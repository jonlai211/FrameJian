<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video Notes Manager</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <div>
          <h1>Video Notes</h1>
          <p class="sub">Manage all saved notes (YouTube & Bilibili).</p>
        </div>
        <div class="actions">
          <button id="export-all">Export All</button>
          <button id="refresh">Refresh</button>
        </div>
      </header>
      <section id="list" class="list"></section>
      <div id="empty" class="empty">No notes yet.</div>
    </div>
    <script src="options.js"></script>
  </body>
</html>
