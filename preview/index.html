<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Notes — UI Preview</title>
  <link rel="stylesheet" href="../src/content.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      font-family: system-ui, -apple-system, sans-serif;
      gap: 32px;
    }

    /* ── Top bar ─────────────────────────────────── */
    .preview-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .preview-title {
      color: #ffffff;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
      opacity: 0.5;
      text-transform: uppercase;
    }

    /* ── State switcher ──────────────────────────── */
    .switcher {
      display: flex;
      gap: 6px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 5px;
    }

    .switcher button {
      background: transparent;
      color: #666;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 12.5px;
      cursor: pointer;
      transition: background 120ms, color 120ms;
      white-space: nowrap;
    }

    .switcher button:hover {
      color: #ccc;
      background: #2a2a2a;
    }

    .switcher button.active {
      background: #0ea5e9;
      color: #ffffff;
      font-weight: 500;
    }

    /* ── Stage ───────────────────────────────────── */
    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .stage-label {
      color: #444;
      font-size: 11px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* Override fixed/absolute positioning for the panel */
    #vn-root {
      position: relative !important;
      top: auto !important;
      right: auto !important;
      opacity: 1 !important;
    }

    /* Subtle glow behind the panel */
    .panel-wrap {
      border-radius: 20px;
      padding: 32px;
      background: radial-gradient(ellipse at center, rgba(14,165,233,0.06) 0%, transparent 70%);
    }
  </style>
</head>
<body>

  <div class="preview-header">
    <div class="preview-title">Video Notes Overlay · UI Preview</div>
  </div>

  <div class="switcher">
    <button class="active" data-state="empty"    onclick="setState('empty',    this)">空状态</button>
    <button               data-state="notes"    onclick="setState('notes',    this)">有笔记</button>
    <button               data-state="summarizing" onclick="setState('summarizing', this)">总结中</button>
    <button               data-state="summary"  onclick="setState('summary',  this)">总结完成</button>
    <button               data-state="collapsed" onclick="setState('collapsed', this)">折叠</button>
  </div>

  <div class="stage">
    <div class="stage-label" id="state-label">展开 · 空状态</div>

    <div class="panel-wrap">
      <div id="vn-root" class="vn-locale-zh">
        <div id="vn-panel">
          <div id="vn-header">
            <div id="vn-title-group">
              <span id="vn-title">视频笔记</span>
              <span id="vn-count-badge"></span>
            </div>
            <div id="vn-header-right">
              <span id="vn-time">--:--</span>
              <button id="vn-toggle">‹</button>
            </div>
          </div>
          <div id="vn-body">
            <div id="vn-input-area">
              <textarea id="vn-input" placeholder="写点什么…" maxlength="2000"></textarea>
              <div id="vn-input-bar">
                <span id="vn-input-ts"></span>
                <div id="vn-actions">
                  <button class="vn-btn" id="vn-add">记录</button>
                  <button class="vn-btn" id="vn-copy-all">复制全部</button>
                  <button class="vn-btn" id="vn-export">导出</button>
                </div>
              </div>
            </div>
            <button class="vn-btn" id="vn-summarize">AI 总结</button>
            <div id="vn-summary"></div>
            <div id="vn-list">
              <div class="vn-item">还没有记录。</div>
            </div>
            <div id="vn-footer">
              <div class="vn-footer-left">
                <button id="vn-lang-toggle">CN</button>
              </div>
              <div id="vn-status"></div>
              <div class="vn-footer-right">
                <button id="vn-manage">管理</button>
                <span id="vn-meta">YouTube</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const NOTES_HTML = `
      <div class="vn-item">
        <div class="vn-item-time">
          <span class="vn-item-time-chip">02:15</span>
          <span>2025/4/27 14:32</span>
        </div>
        <div class="vn-item-text">这里提到了一个很重要的框架，后面要复习一下</div>
        <div class="vn-item-actions">
          <button class="vn-link">跳转</button>
          <button class="vn-link">复制</button>
          <button class="vn-link">编辑</button>
          <button class="vn-link">×</button>
        </div>
      </div>
      <div class="vn-item">
        <div class="vn-item-time">
          <span class="vn-item-time-chip">08:47</span>
          <span>2025/4/27 14:38</span>
        </div>
        <div class="vn-item-text">核心观点：专注在输出而不是输入</div>
        <div class="vn-item-actions">
          <button class="vn-link">跳转</button>
          <button class="vn-link">复制</button>
          <button class="vn-link">编辑</button>
          <button class="vn-link">×</button>
        </div>
      </div>
      <div class="vn-item">
        <div class="vn-item-time">
          <span class="vn-item-time-chip">15:03</span>
          <span>2025/4/27 14:51</span>
        </div>
        <div class="vn-item-text">Q: 如何避免信息焦虑？降低摄入频率，设固定「信息窗口」</div>
        <div class="vn-item-actions">
          <button class="vn-link">跳转</button>
          <button class="vn-link">复制</button>
          <button class="vn-link">编辑</button>
          <button class="vn-link">×</button>
        </div>
      </div>
    `;

    const SUMMARY_TEXT = `[02:15] 第一部分讲了核心框架的来源。作者认为大多数人陷入信息焦虑的根本原因是混淆了「摄入」和「消化」——看视频的时候感觉很充实，但真正留下来的东西很少。

[08:47] 第二个要点：真正有价值的学习发生在输出阶段，而非输入阶段。记笔记本身不是目的，用笔记生产内容才是关键。

[15:03] 最后给出了一个可操作的建议：每天设置固定的「信息窗口」，其余时间完全关闭信息流，专注在处理和输出上。`;

    const STATES = {
      empty: {
        label: '展开 · 空状态',
        collapsed: false,
        time: '--:--',
        inputTs: '',
        badge: '',
        notes: '<div class="vn-item">还没有记录。</div>',
        summarizeText: 'AI 总结',
        summarizeDisabled: false,
        summary: '',
        summaryVisible: false,
      },
      notes: {
        label: '展开 · 有笔记 (3)',
        collapsed: false,
        time: '15:03',
        inputTs: '@ 15:03',
        badge: '3',
        notes: NOTES_HTML,
        summarizeText: 'AI 总结',
        summarizeDisabled: false,
        summary: '',
        summaryVisible: false,
      },
      summarizing: {
        label: '展开 · 总结中',
        collapsed: false,
        time: '15:03',
        inputTs: '@ 15:03',
        badge: '3',
        notes: NOTES_HTML,
        summarizeText: '总结中…',
        summarizeDisabled: true,
        summary: '',
        summaryVisible: false,
      },
      summary: {
        label: '展开 · 总结完成',
        collapsed: false,
        time: '15:03',
        inputTs: '@ 15:03',
        badge: '3',
        notes: NOTES_HTML,
        summarizeText: 'AI 总结',
        summarizeDisabled: false,
        summary: SUMMARY_TEXT,
        summaryVisible: true,
      },
      collapsed: {
        label: '折叠 · 胶囊',
        collapsed: true,
        time: '15:03',
        inputTs: '@ 15:03',
        badge: '3',
        notes: NOTES_HTML,
        summarizeText: 'AI 总结',
        summarizeDisabled: false,
        summary: '',
        summaryVisible: false,
      },
    };

    function setState(key, btn) {
      const s = STATES[key];
      const root = document.getElementById('vn-root');

      document.querySelectorAll('.switcher button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      document.getElementById('state-label').textContent = s.label;
      root.classList.toggle('vn-collapsed', s.collapsed);
      document.getElementById('vn-toggle').textContent = s.collapsed ? '›' : '‹';
      document.getElementById('vn-time').textContent = s.time;
      document.getElementById('vn-input-ts').textContent = s.inputTs;
      document.getElementById('vn-count-badge').textContent = s.badge;
      document.getElementById('vn-list').innerHTML = s.notes;

      const summarizeBtn = document.getElementById('vn-summarize');
      summarizeBtn.textContent = s.summarizeText;
      summarizeBtn.disabled = s.summarizeDisabled;

      const summaryEl = document.getElementById('vn-summary');
      summaryEl.textContent = s.summary;
      summaryEl.classList.toggle('vn-summary-visible', s.summaryVisible);
    }
  </script>
</body>
</html>
